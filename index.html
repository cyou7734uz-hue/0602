<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星星怪物射擊戰</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #050816;
      font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif;
    }

    canvas {
      display: block;
    }
  </style>
</head>

<body>
<script>
let monsters = [];
let missiles = [];
let explosions = [];
let floatingTexts = [];
let bgStars = [];

// ========== 白色星星追蹤怪 ==========
let trackers = [];              // 存放所有白色星星追蹤怪
let lastTrackerSpawnTime = 0;   // 上次生成追蹤怪的時間
const TRACKER_SPAWN_INTERVAL = 2000; // 每 2000 毫秒生成一隻追蹤怪
const TRACKER_SPEED = 3.5;      // 追蹤怪的移動速度
const TRACKER_SIZE = 50;        // 追蹤怪的大小
const TRACKER_HP_DAMAGE = 30;   // 追蹤怪碰到發射器扣的 HP
// ===============================

let score = 0;
let playerHP = 5;
let maxHP = 5;
let gameDuration = 60;
let remainingTime = 60;
let startTime = 0;
let lastSpawnTime = 0;

let gameState = "start";
// start、play、gameover

const colorPalette = [
  "#ff4d6d",
  "#ff8c42",
  "#ffd166",
  "#90be6d",
  "#43aa8b",
  "#4d96ff",
  "#9b5de5",
  "#f15bb5"
];

const meteorPalette = [
  "#f2e9e4",
  "#c9ada7",
  "#9a8c98"
];

const slimePalette = [
  "#3efff3",
  "#56ffce",
  "#a66cff",
  "#ff7cff"
];

function setup() {
  createCanvas(windowWidth, windowHeight);
  angleMode(RADIANS);
  textFont("Microsoft JhengHei");
  createBackgroundStars();
}

function draw() {
  drawSpaceBackground();

  if (gameState === "start") {
    drawStartScreen();
  } else if (gameState === "play") {
    runGame();
  } else if (gameState === "gameover") {
    drawGameOverScreen();
  }
}

function createBackgroundStars() {
  bgStars = [];

  for (let i = 0; i < 140; i++) {
    bgStars.push({
      x: random(width),
      y: random(height),
      size: random(1, 3),
      speed: random(0.15, 0.8),
      alpha: random(90, 220)
    });
  }
}

function drawSpaceBackground() {
  background(5, 8, 22);

  noStroke();

  for (let r = 700; r > 0; r -= 40) {
    fill(70, 40, 140, map(r, 700, 0, 0, 35));
    ellipse(width / 2, height / 2, r * 1.8, r);
  }

  for (let s of bgStars) {
    fill(255, 255, 255, s.alpha);
    circle(s.x, s.y, s.size);

    s.y += s.speed;

    if (s.y > height) {
      s.y = 0;
      s.x = random(width);
    }
  }

  stroke(120, 90, 255, 25);
  strokeWeight(1);

  for (let i = -width; i < width * 2; i += 120) {
    line(i, 0, i + width * 0.35, height);
  }
}

function drawStartScreen() {
  textAlign(CENTER, CENTER);

  fill(255);
  textSize(54);
  textStyle(BOLD);
  text("星星怪物射擊戰", width / 2, height / 2 - 140);

  textSize(18);
  textStyle(NORMAL);
  fill(200, 220, 255);
  text("【基本操作】滑鼠瞄準並點擊發射飛彈", width / 2, height / 2 - 90);

  textSize(16);
  fill(180, 200, 255);
  text("🎯 彩色怪物：10 分", width / 2, height / 2 - 55);
  text("🪨 灰色隕石：10 分（表面有坑洞和裂痕）", width / 2, height / 2 - 30);
  text("💧 透明史萊姆：20 分（半透明方塊，後期出現）", width / 2, height / 2 - 5);

  fill(255, 150, 150);
  textStyle(BOLD);
  text("⭐ 白色星星追蹤怪：50 分（每 2 秒出現，主動靠近發射器！）", width / 2, height / 2 + 25);

  textSize(14);
  fill(255, 100, 100);
  text("⚠️  星星碰到發射器 = 扣 30 HP！注意防守！", width / 2, height / 2 + 55);

  textSize(15);
  fill(150, 255, 150);
  text("生存 60 秒 並 守護中央發射器", width / 2, height / 2 + 85);

  drawMainButton(width / 2 - 130, height / 2 + 125, 260, 70, "開始遊戲");

  drawCuteMonster(width / 2, height / 2 + 210, 85, "#ff8c42", false);
}

function runGame() {
  remainingTime = max(0, gameDuration - floor((millis() - startTime) / 1000));

  if (remainingTime <= 0 || playerHP <= 0) {
    gameState = "gameover";
    return;
  }

  drawUI();

  let spawnInterval = map(remainingTime, gameDuration, 0, 2400, 450);

  if (millis() - lastSpawnTime > spawnInterval) {
    monsters.push(new Monster());
    lastSpawnTime = millis();
  }

  // ===== 白色星星追蹤怪 每 2 秒生成一隻 =====
  if (millis() - lastTrackerSpawnTime > TRACKER_SPAWN_INTERVAL) {
    trackers.push(new Tracker());
    lastTrackerSpawnTime = millis();
  }

  for (let i = 0; i < monsters.length; i++) {
    for (let j = i + 1; j < monsters.length; j++) {
      monsters[i].collide(monsters[j]);
    }
  }

  for (let i = monsters.length - 1; i >= 0; i--) {
    monsters[i].update();
    monsters[i].display();

    let launcherPos = createVector(width / 2, height / 2);
    let d = dist(monsters[i].x, monsters[i].y, launcherPos.x, launcherPos.y);
    if (d < monsters[i].size / 2 + 60) {
      explosions.push(new Explosion(monsters[i].x, monsters[i].y, monsters[i].color));
      floatingTexts.push(new FloatingText("-1 HP", monsters[i].x, monsters[i].y));
      playerHP -= 1;
      monsters.splice(i, 1);
    }
  }

  // ===== 白色星星追蹤怪 更新和顯示 =====
  for (let i = trackers.length - 1; i >= 0; i--) {
    trackers[i].update();
    trackers[i].display();

    // ===== 檢測追蹤怪是否碰到中央發射器，如果碰到就扣 30 HP =====
    let launcherPos = createVector(width / 2, height / 2);
    let d = dist(trackers[i].x, trackers[i].y, launcherPos.x, launcherPos.y);
    if (d < trackers[i].size / 2 + 60) {
      explosions.push(new Explosion(trackers[i].x, trackers[i].y, "#ffffff"));
      floatingTexts.push(new FloatingText("-1 HP", trackers[i].x, trackers[i].y));
      playerHP -= 1;
      trackers.splice(i, 1);
    }
  }

  for (let i = missiles.length - 1; i >= 0; i--) {
    let m = missiles[i];
    m.update();
    m.display();

    if (m.isOffScreen()) {
      missiles.splice(i, 1);
      continue;
    }

    let hit = false;

    for (let j = monsters.length - 1; j >= 0; j--) {
      let p = monsters[j];
      let d = dist(m.x, m.y, p.x, p.y);

      if (d < p.size / 2 + m.size / 2) {
        explosions.push(new Explosion(p.x, p.y, p.color));
        floatingTexts.push(new FloatingText("+" + p.scoreValue, p.x, p.y));

        monsters.splice(j, 1);
        score += p.scoreValue;
        hit = true;
        break;
      }
    }

    // ===== 檢測飛彈是否擊中追蹤怪 =====
    if (!hit) {
      for (let j = trackers.length - 1; j >= 0; j--) {
        let t = trackers[j];
        let d = dist(m.x, m.y, t.x, t.y);

        if (d < t.size / 2 + m.size / 2) {
          explosions.push(new Explosion(t.x, t.y, "#ffffff"));
          floatingTexts.push(new FloatingText("+" + t.scoreValue, t.x, t.y));

          trackers.splice(j, 1);
          score += t.scoreValue;
          hit = true;
          break;
        }
      }
    }

    if (hit) {
      missiles.splice(i, 1);
    }
  }

  for (let i = explosions.length - 1; i >= 0; i--) {
    explosions[i].update();
    explosions[i].display();

    if (explosions[i].isDone()) {
      explosions.splice(i, 1);
    }
  }

  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    floatingTexts[i].update();
    floatingTexts[i].display();

    if (floatingTexts[i].isDone()) {
      floatingTexts.splice(i, 1);
    }
  }

  drawLauncher();
  drawAimArrow();
}

function drawUI() {
  push();

  noStroke();
  fill(0, 0, 0, 100);
  rect(0, 0, width, 72);

  fill(255);
  textSize(24);
  textStyle(BOLD);

  textAlign(LEFT, CENTER);
  text("Score: " + score, 24, 36);

  textAlign(CENTER, CENTER);
  text("剩餘時間: " + remainingTime + " s", width / 2, 36);

  textAlign(RIGHT, CENTER);
  text("怪物數量: " + monsters.length, width - 24, 36);

  pop();

  // 繪製 HP 條
  push();
  let hpBarX = 24;
  let hpBarY = height - 30;
  let hpBarWidth = 200;
  let hpBarHeight = 20;
  let hpBarCorner = 4;

  // 背景
  fill(50, 50, 50);
  stroke(150, 150, 150);
  strokeWeight(2);
  rect(hpBarX, hpBarY, hpBarWidth, hpBarHeight, hpBarCorner);

  // 血條
  let hpPercent = playerHP / maxHP;
  let hpWidth = hpBarWidth * hpPercent;

  if (hpPercent > 0.5) {
    fill(100, 255, 100);
  } else if (hpPercent > 0.25) {
    fill(255, 200, 100);
  } else {
    fill(255, 100, 100);
  }
  noStroke();
  rect(hpBarX, hpBarY, hpWidth, hpBarHeight, hpBarCorner);

  // HP 文字
  fill(255);
  textSize(14);
  textStyle(BOLD);
  textAlign(CENTER, CENTER);
  text(playerHP + "/" + maxHP, hpBarX + hpBarWidth / 2, hpBarY + hpBarHeight / 2);

  pop();
}

function drawLauncher() {
  push();
  translate(width / 2, height / 2);

  noStroke();

  fill(120, 70, 255, 45);
  circle(0, 0, 120);

  fill(160, 120, 255, 80);
  circle(0, 0, 78);

  fill(255);
  circle(0, 0, 20);

  fill(160, 220, 255);
  circle(0, 0, 10);

  pop();
}

function drawAimArrow() {
  push();

  translate(width / 2, height / 2);

  let angle = atan2(mouseY - height / 2, mouseX - width / 2);
  rotate(angle);

  strokeCap(ROUND);
  strokeJoin(ROUND);

  drawingContext.shadowBlur = 28;
  drawingContext.shadowColor = "#9b5de5";

  stroke(130, 70, 255, 150);
  strokeWeight(15);
  line(0, 0, 75, 0);
  line(75, 0, 52, -22);
  line(75, 0, 52, 22);

  drawingContext.shadowBlur = 0;

  stroke(255, 255, 255, 210);
  strokeWeight(4);
  line(0, 0, 75, 0);
  line(75, 0, 52, -22);
  line(75, 0, 52, 22);

  pop();
}

class Monster {
  constructor() {
    let minSize = map(remainingTime, gameDuration, 0, 95, 45);
    let maxSize = map(remainingTime, gameDuration, 0, 150, 70);

    this.size = random(minSize, maxSize);

    this.x = random(this.size, width - this.size);
    this.y = random(90 + this.size, height - this.size);

    this.isSlime = remainingTime <= gameDuration / 2 && random() < 0.5;
    this.color = this.isSlime ? random(slimePalette) : random(meteorPalette);
    this.scoreValue = this.isSlime ? 20 : 10;

    let speed = random(1.3, 3.8);
    let angle = random(TWO_PI);

    this.vx = cos(angle) * speed;
    this.vy = sin(angle) * speed;

    this.rotation = random(TWO_PI);
    this.rotationSpeed = random(-0.015, 0.015);
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.rotation += this.rotationSpeed;

    if (this.x < this.size / 2 || this.x > width - this.size / 2) {
      this.vx *= -1;
    }

    if (this.y < 90 + this.size / 2 || this.y > height - this.size / 2) {
      this.vy *= -1;
    }
  }

  collide(other) {
    let dx = other.x - this.x;
    let dy = other.y - this.y;
    let distance = dist(this.x, this.y, other.x, other.y);
    let minDist = this.size / 2 + other.size / 2;

    if (distance < minDist && distance > 0) {
      let overlap = minDist - distance;
      let nx = dx / distance;
      let ny = dy / distance;

      this.x -= nx * overlap / 2;
      this.y -= ny * overlap / 2;
      other.x += nx * overlap / 2;
      other.y += ny * overlap / 2;

      let tempVx = this.vx;
      let tempVy = this.vy;

      this.vx = other.vx;
      this.vy = other.vy;
      other.vx = tempVx;
      other.vy = tempVy;
    }
  }

  display() {
    let d = dist(mouseX, mouseY, this.x, this.y);
    let isHovered = d < this.size / 2;

    drawCuteMonster(this.x, this.y, this.size, this.color, isHovered, this.rotation, this.isSlime ? "slime" : "meteor");
  }
}

function drawCuteMonster(x, y, size, col, isHovered, rot = 0, type = "meteor") {
  push();
  translate(x, y);
  rotate(rot);

  let time = frameCount * 0.12;
  let baseColor = color(col);
  let isSlime = type === "slime";

  if (isSlime) {
    let outerColor = color(red(baseColor), green(baseColor), blue(baseColor), 128);
    let innerColor = color(red(baseColor), green(baseColor), blue(baseColor), 210);

    noStroke();
    rectMode(CENTER);
    fill(outerColor);
    rect(0, 0, size * 1.2, size * 1.2, size * 0.08);

    fill(innerColor);
    rect(0, 0, size * 0.88, size * 0.88, size * 0.08);

    fill(baseColor);
    ellipse(-size * 0.26, size * 0.4, size * 0.16, size * 0.22);
    ellipse(0, size * 0.46, size * 0.18, size * 0.26);
    ellipse(size * 0.28, size * 0.38, size * 0.14, size * 0.18);

    fill(255, 255, 255, 90);
    ellipse(-size * 0.18, -size * 0.08, size * 0.3, size * 0.16);
    ellipse(size * 0.16, -size * 0.02, size * 0.14, size * 0.08);
  } else {
    let meteorIndex = meteorPalette.indexOf(col.toString().toLowerCase());
    if (meteorIndex === -1) meteorIndex = 0;

    baseColor.setAlpha(255);
    drawingContext.shadowBlur = 0;
    fill(baseColor);
    noStroke();

    beginShape();
    for (let a = 0; a < TWO_PI; a += 0.2) {
      let noiseVal = noise(cos(a) * 1.4 + meteorIndex, sin(a) * 1.4 + meteorIndex, time * 0.3);
      let jagged = map(noiseVal, 0, 1, -size * 0.18, size * 0.12);
      let wobble = sin(a * 3 + time * 0.8) * size * 0.05;
      let r = size * 0.45 + jagged + wobble;
      vertex(cos(a) * r, sin(a) * r);
    }
    endShape(CLOSE);

    fill(255, 255, 255, 18);
    ellipse(-size * 0.12, -size * 0.08, size * 0.32, size * 0.18);
    fill(0, 0, 0, 30);
    ellipse(size * 0.12, size * 0.08, size * 0.22, size * 0.12);

    fill(0, 0, 0, 70);
    ellipse(-size * 0.2, size * 0.18, size * 0.14, size * 0.1);
    ellipse(size * 0.2, -size * 0.18, size * 0.16, size * 0.12);
    ellipse(size * 0.05, size * 0.05, size * 0.1, size * 0.08);

    stroke(0, 0, 0, 70);
    strokeWeight(2);
    line(-size * 0.15, size * 0.1, -size * 0.02, size * 0.02);
    line(size * 0.05, -size * 0.1, size * 0.18, -size * 0.14);
    line(size * 0.06, size * 0.16, size * 0.16, size * 0.12);
    line(-size * 0.08, -size * 0.12, -size * 0.02, -size * 0.16);
    noStroke();
  }

  drawingContext.shadowBlur = 0;

  let eyeOffsetX = size * 0.18;
  let eyeOffsetY = -size * 0.12;
  let eyeSize = size * 0.22;
  let pupilSize = isSlime && isHovered ? eyeSize * 0.25 : eyeSize * 0.45;
  let maxPupilMove = (eyeSize - pupilSize) * 0.4;

  fill(255, 240);
  circle(-eyeOffsetX, eyeOffsetY, eyeSize);
  circle(eyeOffsetX, eyeOffsetY, eyeSize);

  let angleLeft = atan2(mouseY - (y + eyeOffsetY), mouseX - (x - eyeOffsetX));
  let angleRight = atan2(mouseY - (y + eyeOffsetY), mouseX - (x + eyeOffsetX));

  fill(0);
  circle(-eyeOffsetX + cos(angleLeft) * maxPupilMove, eyeOffsetY + sin(angleLeft) * maxPupilMove, pupilSize);
  circle(eyeOffsetX + cos(angleRight) * maxPupilMove, eyeOffsetY + sin(angleRight) * maxPupilMove, pupilSize);

  if (isHovered) {
    fill(255, 180, 200, 220);
    noStroke();
    ellipse(0, size * 0.16, size * 0.24, size * 0.18);
    fill(0);
    ellipse(0, size * 0.16, size * 0.1, size * 0.08);
  } else {
    noFill();
    stroke(0, 120);
    strokeWeight(size * 0.04);
    arc(0, size * 0.08, size * 0.34, size * 0.22, 0.3, PI - 0.3);
  }

  pop();
}

// ============================================
// ===== 白色星星追蹤怪類別 =====
// ============================================
class Tracker {
  constructor() {
    // ===== 先設定大小，才能在下面使用 =====
    this.size = TRACKER_SIZE;
    
    // 白色星星追蹤怪 從畫面邊緣隨機機位產生
    let side = floor(random(4));
    
    if (side === 0) {
      // 上方
      this.x = random(50, width - 50);
      this.y = -this.size;
    } else if (side === 1) {
      // 下方
      this.x = random(50, width - 50);
      this.y = height + this.size;
    } else if (side === 2) {
      // 左方
      this.x = -this.size;
      this.y = random(50, height - 50);
    } else {
      // 右方
      this.x = width + this.size;
      this.y = random(50, height - 50);
    }
    
    this.rotation = 0;
    this.rotationSpeed = 0.08;
    this.scoreValue = 50; // 追蹤怪打中時加上 50 分
  }
  
  // ===== 每一幀更新追蹤怪的位置 =====
  update() {
    // 追蹤怪會持續朝向畫面中心（width/2, height/2）移動
    let centerX = width / 2;
    let centerY = height / 2;
    
    // 計算追蹤怪到中心的方向
    let dx = centerX - this.x;
    let dy = centerY - this.y;
    let distance = sqrt(dx * dx + dy * dy);
    
    // 正規化方向向量
    if (distance > 0) {
      let dirX = dx / distance;
      let dirY = dy / distance;
      
      // 按照 TRACKER_SPEED 速度移動
      this.x += dirX * TRACKER_SPEED;
      this.y += dirY * TRACKER_SPEED;
    }
    
    // 旋轉動畫
    this.rotation += this.rotationSpeed;
  }
  
  display() {
    // 使用特殊的追蹤怪渲染函數
    drawWhiteStarTracker(this.x, this.y, this.size, this.rotation);
  }
}

// ===== 續畫追蹤怪的星星渲染 =====
function drawWhiteStarTracker(x, y, size, rotation) {
  push();
  translate(x, y);
  rotate(rotation);
  
  // 白色星星外區的發光效應
  drawingContext.shadowBlur = 20;
  drawingContext.shadowColor = "rgba(255, 255, 255, 0.8)";
  
  // 星星形狀：由 5 個外機點和 5 個內凹折角
  let outerRadius = size * 0.48;
  let innerRadius = size * 0.2;
  
  noStroke();
  fill(255, 255, 255); // 純白色
  
  beginShape();
  for (let i = 0; i < 10; i++) {
    let angle = (TWO_PI / 10) * i - PI / 2;
    let radius = (i % 2 === 0) ? outerRadius : innerRadius;
    let vx = cos(angle) * radius;
    let vy = sin(angle) * radius;
    vertex(vx, vy);
  }
  endShape(CLOSE);
  
  // 追蹤怪的粗反光角 (淡藍色的光澤效果)
  fill(200, 200, 255, 60);
  ellipse(-size * 0.15, -size * 0.15, size * 0.4, size * 0.3);
  
  // 追蹤怪的知覺物（一個大眼睛和一個小眼睛）
  // 大眼睛
  fill(50, 50, 100);
  circle(-size * 0.2, -size * 0.15, size * 0.18);
  circle(size * 0.15, -size * 0.18, size * 0.15);
  
  // 眼珠亮點
  fill(255, 255, 255, 200);
  circle(-size * 0.2 + size * 0.05, -size * 0.15 + size * 0.04, size * 0.06);
  circle(size * 0.15 + size * 0.04, -size * 0.18 + size * 0.05, size * 0.05);
  
  // 快樂的嘴
  stroke(255, 100, 150);
  strokeWeight(2);
  noFill();
  arc(0, size * 0.1, size * 0.3, size * 0.2, 0.2, PI - 0.2);
  
  // 移除發光效果
  drawingContext.shadowBlur = 0;
  
  pop();
}


class Missile {
  constructor(x, y, vx, vy) {
    this.x = x;
    this.y = y;
    this.vx = vx;
    this.vy = vy;
    this.size = 12;
    this.trail = [];
  }

  update() {
    this.trail.push({
      x: this.x,
      y: this.y
    });

    if (this.trail.length > 8) {
      this.trail.shift();
    }

    this.x += this.vx;
    this.y += this.vy;
  }

  display() {
    push();

    noStroke();

    for (let i = 0; i < this.trail.length; i++) {
      let t = this.trail[i];
      let alpha = map(i, 0, this.trail.length - 1, 40, 180);

      fill(255, 220, 80, alpha);
      circle(t.x, t.y, map(i, 0, this.trail.length - 1, 4, 10));
    }

    drawingContext.shadowBlur = 18;
    drawingContext.shadowColor = "#ffd166";

    fill(255, 230, 80);
    circle(this.x, this.y, this.size);

    fill(255);
    circle(this.x - 2, this.y - 2, this.size * 0.35);

    drawingContext.shadowBlur = 0;

    pop();
  }

  isOffScreen() {
    return this.x < -50 || this.x > width + 50 || this.y < -50 || this.y > height + 50;
  }
}

class Explosion {
  constructor(x, y, col) {
    this.x = x;
    this.y = y;
    this.color = col;
    this.radius = 10;
    this.alpha = 255;
    this.pieces = [];

    for (let i = 0; i < 22; i++) {
      let angle = random(TWO_PI);
      let speed = random(2, 8);

      this.pieces.push({
        x: x,
        y: y,
        vx: cos(angle) * speed,
        vy: sin(angle) * speed,
        size: random(4, 10),
        alpha: 255
      });
    }
  }

  update() {
    this.radius += 10;
    this.alpha -= 18;

    for (let p of this.pieces) {
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.94;
      p.vy *= 0.94;
      p.alpha -= 12;
    }
  }

  display() {
    push();

    let c = color(this.color);
    c.setAlpha(this.alpha);

    noFill();
    stroke(c);
    strokeWeight(5);
    circle(this.x, this.y, this.radius);

    noStroke();

    for (let p of this.pieces) {
      let pc = color(this.color);
      pc.setAlpha(p.alpha);
      fill(pc);
      circle(p.x, p.y, p.size);
    }

    pop();
  }

  isDone() {
    return this.alpha <= 0;
  }
}

class FloatingText {
  constructor(txt, x, y) {
    this.txt = txt;
    this.x = x;
    this.y = y;
    this.alpha = 255;
  }

  update() {
    this.y -= 1.8;
    this.alpha -= 6;
  }

  display() {
    push();

    textAlign(CENTER, CENTER);
    textSize(28);
    textStyle(BOLD);
    fill(255, 230, 90, this.alpha);
    text(this.txt, this.x, this.y);

    pop();
  }

  isDone() {
    return this.alpha <= 0;
  }
}

function mousePressed() {
  if (gameState === "start") {
    if (
      mouseX > width / 2 - 130 &&
      mouseX < width / 2 + 130 &&
      mouseY > height / 2 + 125 &&
      mouseY < height / 2 + 195
    ) {
      startGame();
    }

    return;
  }

  if (gameState === "gameover") {
    startGame();
    return;
  }

  if (gameState === "play") {
    let angle = atan2(mouseY - height / 2, mouseX - width / 2);
    let speed = 16;

    missiles.push(
      new Missile(
        width / 2,
        height / 2,
        cos(angle) * speed,
        sin(angle) * speed
      )
    );
  }
}

function touchStarted() {
  mousePressed();
  return false;
}

function startGame() {
  score = 0;
  playerHP = maxHP;
  remainingTime = gameDuration;
  monsters = [];
  missiles = [];
  explosions = [];
  floatingTexts = [];
  trackers = [];                    // ===== 重置白色星星追蹤怪陣列 =====

  startTime = millis();
  lastSpawnTime = millis();
  lastTrackerSpawnTime = millis();  // ===== 重置追蹤怪的生成計時器 =====

  for (let i = 0; i < 8; i++) {
    monsters.push(new Monster());
  }

  gameState = "play";
}

function drawGameOverScreen() {
  textAlign(CENTER, CENTER);

  fill(255);
  textSize(64);
  textStyle(BOLD);
  text("遊戲結束", width / 2, height / 2 - 95);

  textSize(34);
  fill(255, 230, 90);
  text("最終分數：" + score, width / 2, height / 2 - 25);

  textSize(20);
  fill(220, 220, 255);
  text("點擊畫面可以重新開始", width / 2, height / 2 + 25);

  drawMainButton(width / 2 - 130, height / 2 + 80, 260, 70, "再玩一次");
}

function drawMainButton(x, y, w, h, label) {
  let hover =
    mouseX > x &&
    mouseX < x + w &&
    mouseY > y &&
    mouseY < y + h;

  push();

  drawingContext.shadowBlur = hover ? 25 : 12;
  drawingContext.shadowColor = "#9b5de5";

  if (hover) {
    fill(150, 95, 255);
  } else {
    fill(95, 65, 220);
  }

  stroke(255, 255, 255, 180);
  strokeWeight(2);
  rect(x, y, w, h, 24);

  drawingContext.shadowBlur = 0;

  noStroke();
  fill(255);
  textAlign(CENTER, CENTER);
  textSize(26);
  textStyle(BOLD);
  text(label, x + w / 2, y + h / 2);

  pop();
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  createBackgroundStars();
}
</script>
